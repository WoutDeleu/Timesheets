<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Jaaroverzicht</title>
</head>
<body>
    <section layout:fragment="content">
        <h1 class="mb-4">Jaaroverzicht</h1>

        <!-- Year navigation -->
        <div class="d-flex align-items-center mb-4">
            <a th:href="@{/reports/yearly(year=${selectedYear - 1})}" class="btn btn-outline-secondary me-2">
                <i class="bi bi-chevron-left"></i>
            </a>
            <h4 class="mb-0" th:text="${selectedYear}"></h4>
            <a th:href="@{/reports/yearly(year=${selectedYear + 1})}" class="btn btn-outline-secondary ms-2">
                <i class="bi bi-chevron-right"></i>
            </a>
        </div>

        <!-- Year saldi overview -->
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h6 class="text-muted">Verlof</h6>
                        <h4>
                            <span class="saldo-positive" th:text="${vacationRemaining}"></span>
                            <small class="text-muted">/ 20</small>
                        </h4>
                        <small class="text-muted" th:text="${vacationUsed} + ' opgenomen'"></small>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h6 class="text-muted">ADV</h6>
                        <h4 th:classappend="${advBalance.signum() >= 0} ? 'saldo-positive' : 'saldo-negative'"
                            th:text="${#numbers.formatDecimal(advBalance, 1, 2, 'COMMA')} + ' dagen'"></h4>
                        <small class="text-muted">
                            <span th:text="${#numbers.formatDecimal(advEarned, 1, 2, 'COMMA')}"></span> verdiend,
                            <span th:text="${advUsed}"></span> opgenomen
                        </small>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h6 class="text-muted">Overuren</h6>
                        <h4 th:classappend="${totalOvertime.signum() >= 0} ? 'saldo-positive' : 'saldo-negative'"
                            th:text="${hourFmt.format(totalOvertime)}"></h4>
                        <small class="text-muted">Alle projecten</small>
                    </div>
                </div>
            </div>
        </div>

        <!-- Monthly breakdown table -->
        <div class="card">
            <div class="card-header">
                <i class="bi bi-table me-1"></i>Maandoverzicht
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-sm mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Maand</th>
                                <th class="text-center">Werkdagen</th>
                                <th class="text-center">Totaal uren</th>
                                <th class="text-center">Factureerbaar</th>
                                <th class="text-center">Overuren</th>
                                <th class="text-center">Verlof</th>
                                <th class="text-center">Ziekte</th>
                                <th class="text-center">ADV</th>
                                <th class="text-end">Detail</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="ms : ${monthlySummaries}">
                                <td th:text="${ms.monthName()}"></td>
                                <td class="text-center" th:text="${ms.workDays()}"></td>
                                <td class="text-center"
                                    th:text="${hourFmt.format(ms.totalHours())}"></td>
                                <td class="text-center"
                                    th:text="${hourFmt.format(ms.billableHours())}"></td>
                                <td class="text-center"
                                    th:classappend="${ms.overtimeHours().signum() >= 0} ? 'saldo-positive' : 'saldo-negative'"
                                    th:text="${hourFmt.format(ms.overtimeHours())}"></td>
                                <td class="text-center" th:text="${ms.vacationDays()}"></td>
                                <td class="text-center" th:text="${ms.sickDays()}"></td>
                                <td class="text-center" th:text="${ms.advDays()}"></td>
                                <td class="text-end">
                                    <a th:href="@{/reports/monthly(year=${ms.year()}, month=${ms.month()})}"
                                       class="btn btn-sm btn-outline-primary">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
