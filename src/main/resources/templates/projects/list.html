<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Projecten</title>
</head>
<body>
    <section layout:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Projecten</h1>
            <a th:href="@{/projects/new}" class="btn btn-primary">
                <i class="bi bi-plus-lg me-1"></i>Nieuw project
            </a>
        </div>

        <!-- Success message -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Projects table -->
        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>Naam</th>
                        <th>Beschrijving</th>
                        <th class="text-center">Uren/dag</th>
                        <th class="text-center">Factureerbaar</th>
                        <th class="text-center">Status</th>
                        <th class="text-end">Acties</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="project : ${projects}" th:classappend="${!project.active} ? 'table-secondary'">
                        <td>
                            <a th:href="@{/projects/{id}/dashboard(id=${project.id})}"
                               class="text-decoration-none">
                                <strong th:text="${project.name}"></strong>
                            </a>
                        </td>
                        <td>
                            <span th:text="${project.description}" class="text-muted"></span>
                        </td>
                        <td class="text-center">
                            <span th:if="${project.dailyHourTarget != null}"
                                  th:text="${hourFmt.format(project.dailyHourTarget)}"></span>
                            <span th:if="${project.dailyHourTarget == null}" class="text-muted">—</span>
                        </td>
                        <td class="text-center">
                            <i th:if="${project.billable}" class="bi bi-check-circle-fill text-success"></i>
                            <i th:unless="${project.billable}" class="bi bi-dash-circle text-muted"></i>
                        </td>
                        <td class="text-center">
                            <span th:if="${project.active}" class="badge bg-success">Actief</span>
                            <span th:unless="${project.active}" class="badge bg-secondary">Gearchiveerd</span>
                        </td>
                        <td class="text-end">
                            <a th:href="@{/projects/{id}/dashboard(id=${project.id})}"
                               class="btn btn-sm btn-outline-info me-1" title="Dashboard">
                                <i class="bi bi-speedometer2"></i>
                            </a>
                            <a th:href="@{/projects/{id}/edit(id=${project.id})}"
                               class="btn btn-sm btn-outline-primary me-1">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:if="${project.active}"
                                  th:action="@{/projects/{id}/archive(id=${project.id})}"
                                  method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-outline-warning"
                                        title="Archiveren">
                                    <i class="bi bi-archive"></i>
                                </button>
                            </form>
                            <form th:unless="${project.active}"
                                  th:action="@{/projects/{id}/activate(id=${project.id})}"
                                  method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-outline-success"
                                        title="Activeren">
                                    <i class="bi bi-arrow-counterclockwise"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(projects)}">
                        <td colspan="6" class="text-center text-muted py-4">
                            Geen projecten gevonden. <a th:href="@{/projects/new}">Maak een nieuw project aan.</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
</body>
</html>
